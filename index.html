<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cards Toggle</title>
</head>
<body>
    <h1>Parque Villa Lobos</h1>
    
    <div class="card" id="card1">
    <img src="https://toptripadventure.com.br/wp-content/uploads/2020/01/pontaGrossa.jpg" alt="">
    <h2>Buraco do Padre</h2>
    <p>Um excelente ponto turístico em Ponta Grossa</p>
</div>
    <div class="card desligar" id="card2">
    <img src="https://www.hoteldelreyfoz.com.br/wp-content/uploads/2017/11/vista-cataratas-do-iguacu-scaled-1.jpg.webp" alt="">
    <h2>Cataratas do Iguaçu</h2>
    <p>Um excelente ponto turístico em Ponta Grossa</p>
</div>

  <script>
     cartao1 = document.getElementById("card1");
     cartao2 = document.getElementById("card2");
     
     cartao1.addEventListener("click", ()=>{
          cartao1.classList.toggle("desligar");
          cartao2.classList.toggle("desligar");
    })

     cartao2.addEventListener("click", ()=>{
          cartao1.classList.toggle("desligar");
          cartao2.classList.toggle("desligar");
    })
   </script>
   </body>
</html>
